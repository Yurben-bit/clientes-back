apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: <DOCKER_USERNAME>/clientes-backend:latest
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: mysql-secret
